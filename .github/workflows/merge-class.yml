name: Merge class

# L0 two-tier merge policy (KYL-1316 / KYL-1292).
# Classifies every PR, applies class:* labels, and posts the required
# merge/human-approval check (pass for Class A; fail for Class B until Josh approves).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

concurrency:
  group: merge-class-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  classify:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      HUMAN_REVIEWER: Josh-moreton
    outputs:
      class: ${{ steps.merge_class.outputs.class }}
      label: ${{ steps.merge_class.outputs.label }}
      reason: ${{ steps.merge_class.outputs.reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Classify
        id: merge_class
        uses: ./.github/actions/merge-class
        with:
          human-reviewer: ${{ env.HUMAN_REVIEWER }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post merge/human-approval check
        env:
          MERGE_CLASS: ${{ steps.merge_class.outputs.class }}
          MERGE_REASON: ${{ steps.merge_class.outputs.reason }}
        uses: actions/github-script@v7
        with:
          script: |
            const cls = process.env.MERGE_CLASS;
            const reason = process.env.MERGE_REASON || '';
            const humanReviewer = process.env.HUMAN_REVIEWER || 'Josh-moreton';
            const headSha = context.payload.pull_request.head.sha;
            const name = 'merge/human-approval';

            let conclusion = 'success';
            let title = 'Class A — human approval not required';
            let summary = `Class A (${reason}). Auto-merge may proceed once other required checks are green.`;

            if (cls === 'B') {
              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              const reviewer = humanReviewer.toLowerCase();
              // Latest human review on this head wins (APPROVED after CHANGES_REQUESTED, etc.).
              const onHead = reviews
                .filter((r) =>
                  r.user &&
                  r.user.login.toLowerCase() === reviewer &&
                  r.commit_id === headSha &&
                  (r.state === 'APPROVED' || r.state === 'CHANGES_REQUESTED' || r.state === 'DISMISSED')
                )
                .sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at));
              const latest = onHead[0];
              const approvedOnHead = latest && latest.state === 'APPROVED';
              if (approvedOnHead) {
                conclusion = 'success';
                title = `Class B — ${humanReviewer} approved current head`;
                summary = `${humanReviewer} approved ${headSha}. Merge may proceed once other required checks are green.`;
              } else {
                conclusion = 'failure';
                title = `Class B — awaiting ${humanReviewer} approval`;
                summary = `${reason}. Requested reviewer: ${humanReviewer}. Approving review of the current head clears this check.`;
              }
            }

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name,
              head_sha: headSha,
              status: 'completed',
              conclusion,
              output: { title, summary },
            });

      - name: Post merge-class check
        env:
          MERGE_CLASS: ${{ steps.merge_class.outputs.class }}
          MERGE_LABEL: ${{ steps.merge_class.outputs.label }}
          MERGE_REASON: ${{ steps.merge_class.outputs.reason }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'merge-class',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: `Class ${process.env.MERGE_CLASS}`,
                summary: `${process.env.MERGE_LABEL} — ${process.env.MERGE_REASON}`,
              },
            });

      # Labels applied with GITHUB_TOKEN do not re-trigger other workflows, so
      # enable auto-merge here instead of relying on a labeled event.
      - name: Enable Class A auto-merge
        if: steps.merge_class.outputs.class == 'A'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --repo "$GH_REPO" --auto --squash \
            || gh pr merge "$PR_NUMBER" --repo "$GH_REPO" --auto --merge \
            || echo "::warning::Could not enable auto-merge (repo setting or permissions)."
