name: Class A auto-merge

# Backup path: if Class A is already labelled (manual label or later sync),
# enable auto-merge. Primary path is merge-class.yml in-band — GITHUB_TOKEN
# label events from merge-class do not retrigger workflows.

on:
  pull_request:
    types: [labeled, synchronize, reopened, ready_for_review, opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: >
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'class:maintenance')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr merge "$PR_NUMBER" --repo "$GH_REPO" --auto --squash \
            || gh pr merge "$PR_NUMBER" --repo "$GH_REPO" --auto --merge \
            || echo "::warning::Could not enable auto-merge (repo setting or permissions). Class A still labelled."
