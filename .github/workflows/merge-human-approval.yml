name: Merge human approval

# Keeps merge/human-approval aligned with the latest human review of the Class B head.
# APPROVED → success; CHANGES_REQUESTED / dismissed action → failure.

on:
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  checks: write
  pull-requests: read

jobs:
  sync-human-approval:
    # Dismissed reviews fire action=dismissed; review.state keeps the prior value
    # (often still "approved") and never becomes "dismissed".
    if: >
      github.event.action == 'dismissed' ||
      github.event.review.state == 'approved' ||
      github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    env:
      HUMAN_REVIEWER: Josh-moreton
    steps:
      - name: Sync merge/human-approval check
        uses: actions/github-script@v7
        with:
          script: |
            const expected = (process.env.HUMAN_REVIEWER || 'Josh-moreton').toLowerCase();
            const reviewer = (context.payload.review.user.login || '').toLowerCase();
            if (reviewer !== expected) {
              core.info(`Reviewer ${reviewer} is not ${expected} — skipping.`);
              return;
            }

            // pull_request_review payloads often omit labels — fetch the PR.
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const labels = (pr.labels || []).map((l) => l.name);
            if (!labels.includes('class:review')) {
              core.info('Not Class B (class:review) — skipping.');
              return;
            }

            const reviewSha = context.payload.review.commit_id;
            const headSha = pr.head.sha;
            if (!reviewSha || reviewSha !== headSha) {
              core.info(`Review SHA ${reviewSha} does not match head ${headSha} — skipping.`);
              return;
            }

            const human = process.env.HUMAN_REVIEWER || 'Josh-moreton';
            const dismissed = context.payload.action === 'dismissed';
            const state = dismissed
              ? 'dismissed'
              : (context.payload.review.state || '').toLowerCase();
            const approved = !dismissed && state === 'approved';

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'merge/human-approval',
              head_sha: headSha,
              status: 'completed',
              conclusion: approved ? 'success' : 'failure',
              output: {
                title: approved
                  ? `Class B — ${human} approved current head`
                  : `Class B — ${human} review is ${state}`,
                summary: approved
                  ? `Approved by ${human} on ${headSha}.`
                  : `Latest ${human} review on ${headSha} is ${state}. Approving review of the current head clears this check.`,
              },
            });
